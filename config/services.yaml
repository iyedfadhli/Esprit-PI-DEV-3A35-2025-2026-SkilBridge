# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration

parameters:
    mercure.public_url: '%env(MERCURE_PUBLIC_URL)%'
    mercure.jwt_secret: '%env(MERCURE_JWT_SECRET)%'
    CHALLENGES_UPLOAD_DIR: '%env(resolve:CHALLENGES_UPLOAD_DIR)%'
    stripe_secret_key: '%env(STRIPE_SECRET_KEY)%'
    stripe_currency: '%env(STRIPE_CURRENCY)%'
    contract_signed_email: '%env(CONTRACT_SIGNED_EMAIL)%'
    mailer_from: '%env(MAILER_FROM)%'
    gemini_api_key: '%env(GEMINI_API_KEY)%'
    neutrino_user_id: '%env(NEUTRINO_USER_ID)%'
    neutrino_api_key: '%env(NEUTRINO_API_KEY)%'
    perspective_api_key: '%env(PERSPECTIVE_API_KEY)%'
    news_api_key: '%env(NEWS_API_KEY)%'
    fight_moderation_url: '%env(APP_FIGHT_MODERATION_URL)%'
    fight_moderation_timeout: '%env(int:FIGHT_MODERATION_TIMEOUT)%'
    fight_moderation_fail_open: '%env(bool:FIGHT_MODERATION_FAIL_OPEN)%'


services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $geminiApiKey: '%gemini_api_key%'
            $neutrinoUserId: '%neutrino_user_id%'
            $neutrinoApiKey: '%neutrino_api_key%'
            $perspectiveApiKey: '%perspective_api_key%'
            $newsApiKey: '%news_api_key%'
            $fightModerationUrl: '%fight_moderation_url%'
            $fightModerationTimeout: '%fight_moderation_timeout%'
            $fightModerationFailOpen: '%fight_moderation_fail_open%'
            $mailerFrom: '%mailer_from%'
            $contractSignedEmail: '%contract_signed_email%'
    Symfony\Component\Security\Http\Logout\LogoutUrlGenerator:
        alias: security.logout_url_generator
    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
    App\EventSubscriber\TwigGlobalsSubscriber:
        tags:
            - { name: 'kernel.event_subscriber' }

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
